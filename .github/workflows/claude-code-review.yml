name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]
    # Optional: Only run on specific file changes
    # paths:
    #   - "src/**/*.ts"
    #   - "src/**/*.tsx"
    #   - "src/**/*.js"
    #   - "src/**/*.jsx"

jobs:
  claude-review:
    # Optional: Filter by PR author
    # if: |
    #   github.event.pull_request.user.login == 'external-contributor' ||
    #   github.event.pull_request.user.login == 'new-developer' ||
    #   github.event.pull_request.author_association == 'FIRST_TIME_CONTRIBUTOR'

    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          allowed_tools: "Bash(git log*),Bash(git diff*),Bash(git status*),Bash(git show*),Bash(gh pr*),Bash(gh api*),Read,Glob,Grep"
          prompt: |
            Review this pull request and post your findings as a PR review comment.

            Use the /pr-review workflow:
            - Correctness against any spec or ADR referenced in the PR description
            - TypeScript safety (no `any`, no silent error swallowing)
            - Forbidden patterns: console.log in production modules, direct Anthropic calls in sub-apps, iframes in shell
            - Auth middleware on new routes
            - ADR coverage: does this change introduce an undocumented architectural decision?
            - Test coverage for new code paths

            Output: APPROVE | REQUEST CHANGES | BLOCKED verdict with specific findings.
          # See https://github.com/anthropics/claude-code-action/blob/main/docs/usage.md

