name: Claude Code Review

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to review"
        required: true
        type: string

jobs:
  claude-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: "--allowedTools Bash(git log*),Bash(git diff*),Bash(git status*),Bash(git show*),Bash(gh pr*),Bash(gh api*),Read,Glob,Grep"
          prompt: |
            Review PR #${{ github.event.inputs.pr_number }} in this repository and post your findings as a comment on it.

            Use: gh pr comment ${{ github.event.inputs.pr_number }} --body "..."

            Review checklist:
            - Correctness against any spec or ADR referenced in the PR description
            - TypeScript safety (no `any`, no silent error swallowing)
            - Forbidden patterns: console.log in production modules, direct Anthropic calls in sub-apps, iframes in shell
            - Stack consistency: bundler, framework, and build tool choices must match the established stack in domain-knowledge/shared-stack.md and existing sub-apps
            - Auth middleware on new routes
            - ADR coverage: does this change introduce an undocumented architectural decision?
            - Test coverage for new code paths

            Output: APPROVE | REQUEST CHANGES | BLOCKED verdict with specific findings.
