name: CI

on: [push, pull_request]

jobs:
  build-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test

      - name: Launcher registrations test (ADR-0058)
        run: pnpm --filter @core/launcher-tests test

  check-provenance:
    name: Check ADR Provenance (ADR-0065)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          # Need full history so `git cat-file -e <sha>` resolves Provenance SHAs.
          fetch-depth: 0

      - name: Run provenance check
        run: bash scripts/check-provenance.sh
