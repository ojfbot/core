name: Skill Audit

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  skill-audit:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run skill audit (heuristic mode)
        run: bash scripts/hooks/pr-skill-audit.sh --pr=${{ github.event.pull_request.number }} --mode=heuristic
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Post audit comment
        if: always()
        run: |
          REPORT=$(cat /tmp/skill-audit-report.md 2>/dev/null || echo "No audit report generated")
          gh pr comment ${{ github.event.pull_request.number }} --body "$REPORT"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
